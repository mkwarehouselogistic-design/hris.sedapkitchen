<!DOCTYPE html>
<html>
<head>
  <title>HRIS Sedap Kitchen 2.0</title>
</head>
<body>
  <iframe 
    src="https://script.google.com/a/~/macros/s/AKfycbxWIjkFVvqoW3hgAhweiGM9ekTgxcG7tefl-3pa4YbfyjrcQ_U66uek4LU2M9SRTll3/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
